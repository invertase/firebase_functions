name: firebase_functions
description: Firebase SDK for Cloud Functions (Dart)
version: 0.1.0
repository: https://github.com/invertase/firebase-functions-dart
publish_to: none

environment:
  sdk: ^3.9.0

workspace:
  - example/https
  - example/firestore
  - example/pubsub
  - example/database
  - example/storage
  - example/auth
  - example/scheduler
  - example/alerts
  - example/eventarc
  - example/tasks
  - example/testlab
  - example/remoteconfig
  - example/firestore_test
  - test/fixtures/dart_reference

dependencies:
  analyzer: '>=10.0.1 <13.0.0'
  build: ^4.0.4
  dart_jsonwebtoken: ^3.1.1
  firebase_admin_sdk:
    git:
      url: https://github.com/firebase/firebase-admin-dart.git
      ref: main
      path: packages/firebase_admin_sdk
  glob: ^2.1.3
  google_cloud_firestore:
    git:
      url: https://github.com/firebase/firebase-admin-dart.git
      ref: main
      path: packages/google_cloud_firestore
  http: ^1.6.0
  meta: ^1.18.0
  protobuf: ^6.0.0
  shelf: ^1.4.2
  source_gen: ^4.2.0
  stack_trace: ^1.12.1
  yaml_edit: ^2.2.3

dev_dependencies:
  build_runner: ^2.10.5
  dart_flutter_team_lints: ^3.0.0
  mocktail: ^1.0.4
  test: ^1.29.0
  yaml: ^3.1.3

dependency_overrides:
  firebase_admin_sdk:
    git:
      url: https://github.com/firebase/firebase-admin-dart.git
      ref: main
      path: packages/firebase_admin_sdk
  google_cloud_firestore:
    git:
      url: https://github.com/firebase/firebase-admin-dart.git
      ref: main
      path: packages/google_cloud_firestore
